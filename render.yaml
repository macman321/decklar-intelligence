services:
  - type: web
    name: gavin-voice-api
    runtime: node
    plan: free
    rootDir: gavin/blog/voice-api
    buildCommand: npm install
    startCommand: node voice-server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4005
      - key: VOICE_API_PORT
        value: 4005
      - key: ELEVENLABS_API_KEY
        sync: false
